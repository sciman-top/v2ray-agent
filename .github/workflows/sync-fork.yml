name: Sync Fork
on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync upstream changes
        uses: tgymnich/fork-sync@v1.9
        with:
          owner: sciman-top
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          head: master
